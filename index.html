<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjay Jaiswal | Product Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              serif: ['Instrument Serif', 'serif'],
            },
            colors: {
              violet: {
                DEFAULT: '#6366F1',
                hover: '#4F46E5',
                active: '#4338CA',
              }
            },
            animation: {
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 20s ease-in-out infinite',
              'spin-slow': 'spin 60s linear infinite',
              'beam-sweep': 'beam-sweep 15s ease-in-out infinite',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: 1, transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(99, 102, 241, 0)' },
                '50%': { opacity: 0.8, transform: 'scale(1.05)', boxShadow: '0 0 20px 4px rgba(99, 102, 241, 0.4)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-40px) rotate(5deg)' },
              },
              'beam-sweep': {
                '0%': { transform: 'translateX(-100%) rotate(-45deg)', opacity: 0 },
                '20%': { opacity: 0.4 },
                '50%': { transform: 'translateX(100%) rotate(-45deg)', opacity: 0.4 },
                '100%': { transform: 'translateX(200%) rotate(-45deg)', opacity: 0 },
              }
            }
          },
        },
      }
    </script>
    <style>
        :root {
            --bg: #09090b;
            --text-main: #FAFAFA;
            --text-muted: #71717A;
            --border: #18181B;
            --accent: #6366F1;
            --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
            --spotlight-color: rgba(99, 102, 241, 0.03);
            --grid-line: rgba(255, 255, 255, 0.04);
            --sub-grid-line: rgba(255, 255, 255, 0.015);
            
            /* Organic Atmospheric Palette - Dark Mode */
            --g1: rgba(20, 184, 166, 0.12); /* Teal */
            --g2: rgba(6, 182, 212, 0.08);  /* Cyan */
            --g3: rgba(79, 70, 229, 0.1);   /* Indigo */
            --g4: rgba(139, 92, 246, 0.06); /* Violet */
            
            --glyph-color: rgba(255, 255, 255, 0.05);
            --beam-color: rgba(99, 102, 241, 0.05);
            
            --grain-opacity: 0.03;
            --btn-primary-bg: #6366F1;
            --btn-primary-text: #FFFFFF;
            --theme-transition: 700ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        html.light {
            --bg: #FFFFFF;
            --text-main: #09090B;
            --text-muted: #52525B;
            --border: #E4E4E7;
            --accent: #4F46E5;
            --spotlight-color: rgba(79, 70, 229, 0.02);
            --grid-line: rgba(0, 0, 0, 0.03);
            --sub-grid-line: rgba(0, 0, 0, 0.01);
            
            /* Organic Atmospheric Palette - Light Mode */
            --g1: rgba(20, 184, 166, 0.05);
            --g2: rgba(6, 182, 212, 0.04);
            --g3: rgba(79, 70, 229, 0.04);
            --g4: rgba(139, 92, 246, 0.03);
            
            --glyph-color: rgba(0, 0, 0, 0.03);
            --beam-color: rgba(79, 70, 229, 0.02);
            
            --grain-opacity: 0.05;
        }

        *, *::before, *::after {
            transition-property: background-color, border-color, color, fill, stroke, box-shadow, opacity, backdrop-filter;
            transition-duration: var(--theme-transition);
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none !important;
        }

        a, button, [role="button"], input, select, textarea, .cursor-pointer {
            cursor: none !important;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        /* 3D Grid System */
        .hero-perspective-container {
            position: absolute;
            inset: 0;
            perspective: 1500px;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .hero-grid-main {
            position: absolute;
            inset: -50% -20%;
            background-image: 
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: rotateX(25deg) translateZ(0);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black, transparent 85%);
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 85%);
        }

        .hero-grid-sub {
            position: absolute;
            inset: -50% -20%;
            background-image: 
                linear-gradient(to right, var(--sub-grid-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--sub-grid-line) 1px, transparent 1px);
            background-size: 20px 20px;
            transform: rotateX(25deg) translateZ(-80px);
            opacity: 0.4;
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 90%);
        }

        /* Floating Technical Elements */
        .bg-glyph {
            position: absolute;
            color: var(--glyph-color);
            pointer-events: none;
            user-select: none;
            z-index: 1;
        }

        /* Sweep Beam Effect */
        .beam-sweep {
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 200%;
            background: linear-gradient(to bottom, transparent, var(--beam-color), transparent);
            box-shadow: 0 0 30px 10px var(--beam-color);
            transform: rotate(-45deg);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Atmosphere Canvas */
        .hero-ambient-canvas {
            position: absolute;
            inset: -10%;
            filter: blur(140px);
            z-index: -1;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: breathe var(--duration) ease-in-out infinite alternate;
        }
        
        html.light .blob {
            mix-blend-mode: multiply;
            opacity: 0.5;
        }

        @keyframes breathe {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.7; }
            50% { transform: translate(var(--x), var(--y)) scale(1.15) rotate(5deg); opacity: 0.9; }
            100% { transform: translate(var(--x-end), var(--y-end)) scale(0.9) rotate(-3deg); opacity: 0.6; }
        }

        /* Cinematic Grain Texture */
        .grain::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9999;
            filter: contrast(120%) brightness(100%);
        }

        #spotlight {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            background: radial-gradient(
                1000px circle at var(--x, 50%) var(--y, 50%),
                var(--spotlight-color),
                transparent 100%
            );
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        @keyframes heroReveal {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-hero {
            opacity: 0;
            animation: heroReveal 0.7s var(--ease-out) forwards;
        }

        .reveal {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.8s ease, transform 0.8s var(--ease-out);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.6875rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-violet {
            background-color: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272A;
            border-radius: 10px;
        }
        html.light ::-webkit-scrollbar-thumb {
            background: #D4D4D8;
        }

        @media (prefers-reduced-motion: reduce) {
            .blob, .animate-float, .animate-spin-slow, .animate-beam-sweep { 
                animation: none !important; 
            }
        }
    </style>
